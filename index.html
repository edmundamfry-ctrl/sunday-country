<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><meta name="theme-color" content="#090705"><title>Sunday Country</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
/* ============================================================
   SUNDAY COUNTRY — STYLE
   Bourbon, dried blood, stadium sodium-light. Mobile-first.
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Spectral:ital,wght@0,400;0,500;1,400&display=swap');

:root{
  --bg:#090705;
  --ink:#f2dfb3;
  --ink-dim:#a88e64;
  --gold:#d6a340;
  --gold-deep:#9d7335;
  --line:#6d4c22;
  --panel:#140d08;
  --panel-2:#1a120d;
  --blood:#4b1c14;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Spectral',Georgia,serif;
  line-height:1.6;
  font-size:17px;
  -webkit-text-size-adjust:100%;
  overflow-x:hidden;
}

h1,h2,h3{font-family:'Oswald',sans-serif;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;line-height:1.05;font-weight:700}
h2{font-size:1.35rem;margin:.2em 0 .6em}
h3{font-size:1rem;color:var(--gold-deep);margin:1.4em 0 .5em}

/* ---------- HERO ---------- */
.hero{
  min-height:100dvh;display:flex;align-items:center;justify-content:center;
  text-align:center;padding:32px 22px;
  background:
    linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.88)),
    radial-gradient(circle at 50% 12%,var(--blood),var(--bg) 62%);
}
.hero-inner{max-width:560px;animation:rise .8s ease both}
.title-mark{
  font-size:clamp(3.2rem,18vw,6rem);margin:0 0 .15em;
  text-shadow:0 0 30px rgba(214,163,64,.25);letter-spacing:.02em;
}
.tagline{color:var(--ink-dim);font-style:italic;font-size:1.05rem;margin:0 auto 2rem;max-width:34ch}
.title-actions{display:flex;flex-direction:column;gap:12px}

/* ---------- LAYOUT ---------- */
.wrap{max-width:680px;margin:0 auto;padding:18px 16px 64px}
.card{
  border:1px solid var(--line);background:var(--panel);
  padding:20px 18px;border-radius:2px;
  box-shadow:0 0 0 1px rgba(0,0,0,.4),0 18px 40px rgba(0,0,0,.45);
  animation:rise .45s ease both;
}
p{margin:0 0 1em}

/* ---------- CHOICES (tap targets) ---------- */
.choice{
  display:block;width:100%;text-align:left;
  border:1px solid var(--line);background:var(--panel-2);color:var(--ink);
  padding:16px 16px;margin:11px 0;border-radius:2px;
  font-family:'Spectral',serif;font-size:1rem;line-height:1.4;
  cursor:pointer;transition:background .15s,transform .05s,border-color .15s;
  -webkit-tap-highlight-color:transparent;
}
.choice:active{transform:translateY(1px);background:#26180e}
.choice.primary{border-color:var(--gold);color:var(--gold)}
.choice.ghost{background:transparent;color:var(--ink-dim);border-color:#3a2814}
.choice.disabled{opacity:.45;cursor:not-allowed}
.lock-reason{display:block;margin-top:6px;font-size:.78rem;font-style:italic;color:#a85a3f;letter-spacing:.02em}

/* ---------- DICE OUTCOME BEATS ---------- */
.roll-result{border-left:4px solid var(--line);padding:16px 16px;margin:4px 0 18px;background:#100905;border-radius:0 3px 3px 0;animation:rise .4s ease both}
.roll-result p{margin:0;font-size:1.05rem;line-height:1.55}
.roll-result.rr-win{border-left-color:#4e7d3a;background:#0d1208}
.roll-result.rr-critwin{border-left-color:var(--gold);background:#15100a;box-shadow:inset 0 0 30px rgba(214,163,64,.08)}
.roll-result.rr-fail{border-left-color:#7d4a2a;background:#120c08}
.roll-result.rr-critfail{border-left-color:#8a2f24;background:#160a08;box-shadow:inset 0 0 30px rgba(138,47,36,.12)}

/* ---------- GAME-DAY SIM ---------- */
.gd-status{margin:0 0 16px;border:1px solid #4e3416;border-radius:3px;padding:11px 12px;background:#0f0906}
.gd-line{display:flex;justify-content:space-between;font-family:'Oswald',sans-serif;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:9px}
.gd-line span:nth-child(2){color:var(--gold)}
.gd-field{position:relative;height:14px;border-radius:7px;background:linear-gradient(90deg,#1a2a14,#24150c 50%,#3a1410);overflow:visible;border:1px solid #2a1d0f}
.gd-ball{position:absolute;top:50%;width:10px;height:10px;border-radius:50%;background:var(--gold);box-shadow:0 0 10px var(--gold);transform:translate(-50%,-50%);transition:left .5s cubic-bezier(.2,.8,.2,1)}
.gd-call{position:relative}
.gd-blurb{display:block;margin-top:6px;font-size:.8rem;font-style:italic;color:var(--ink-dim);line-height:1.35}

/* ---------- SEASON GAUNTLET ---------- */
.season-bar{display:flex;justify-content:space-between;align-items:center;gap:8px;margin:0 0 12px;padding:8px 11px;border:1px solid var(--gold-deep);border-radius:3px;background:#130d07;font-family:'Oswald',sans-serif;font-size:.72rem;letter-spacing:.05em;text-transform:uppercase}
.season-bar span:first-child{color:var(--gold)}
.season-bar span:last-child{color:var(--ink);font-weight:700}
.season-game{color:var(--ink-dim)!important;text-align:center;flex:1}
.season-warn{margin:0 0 14px;padding:9px 12px;border-left:3px solid #8a2f24;background:#160a08;color:#d98a6f;font-size:.82rem;font-style:italic;border-radius:0 3px 3px 0}
@media(hover:hover){ .choice:hover{background:#26180e;border-color:var(--gold-deep)} }

/* ---------- WORLD / RADIO BOX ---------- */
.world{
  border-left:3px solid var(--gold-deep);
  padding:13px 14px;background:#100905;margin:16px 0;
  color:#d9c291;font-style:italic;border-radius:0 2px 2px 0;
}

/* ---------- STATS ---------- */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 0 18px}
.stat{border:1px solid #4e3416;padding:10px 11px;background:#0f0906;border-radius:2px}
.stat-label{font-family:'Oswald',sans-serif;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-dim)}
.bar{height:8px;background:#24150c;margin-top:7px;border-radius:4px;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,var(--gold-deep),var(--gold));transition:width .9s cubic-bezier(.2,.8,.2,1)}

.small{font-size:.78rem;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.1em}

/* ---------- INPUT ---------- */
input{
  width:100%;padding:15px;background:#0e0805;color:var(--ink);
  border:1px solid var(--line);border-radius:2px;
  font-size:17px;font-family:'Spectral',serif;margin:8px 0 16px;
}
input:focus{outline:none;border-color:var(--gold)}

/* ---------- TEXTING LAUNCHER ---------- */
.thread-launch{margin-top:22px;padding-top:16px;border-top:1px solid #2a1d0f}
.thread-launch .small{display:block;margin-bottom:8px}
.text-btn{border-color:var(--gold-deep)}

/* ---------- TEXTING OVERLAY ---------- */
.tx-overlay{
  position:fixed;inset:0;z-index:50;
  background:rgba(0,0,0,.6);backdrop-filter:blur(3px);
  display:flex;align-items:flex-end;justify-content:center;
  animation:fade .2s ease both;
}
.tx-sheet{
  width:100%;max-width:680px;height:88dvh;
  background:#0c0a08;border:1px solid var(--line);border-bottom:none;
  border-radius:14px 14px 0 0;display:flex;flex-direction:column;
  animation:slideUp .28s cubic-bezier(.2,.8,.2,1) both;
}
.tx-head{
  display:flex;align-items:center;gap:10px;padding:14px 14px;
  border-bottom:1px solid #241a10;
}
.tx-close{background:none;border:none;color:var(--gold);font-size:1.8rem;line-height:1;cursor:pointer;padding:0 4px}
.tx-name{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.06em;color:var(--ink);font-weight:500}
.tx-dot{width:8px;height:8px;border-radius:50%;background:var(--hue);margin-left:auto;box-shadow:0 0 8px var(--hue)}
.tx-body{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:78%;padding:10px 13px;border-radius:16px;font-size:.97rem;line-height:1.35;word-wrap:break-word;animation:pop .18s ease both}
.msg.them{align-self:flex-start;background:#1c1812;border:1px solid #2e2316;border-bottom-left-radius:4px}
.msg.me{align-self:flex-end;background:var(--hue,#7a5a20);color:#fff;border-bottom-right-radius:4px}
.sys{align-self:center;color:var(--ink-dim);font-size:.8rem;font-style:italic;text-align:center;padding:6px 0}
.typing{display:flex;gap:4px;align-items:center}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--ink-dim);animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
.tx-input{display:flex;gap:8px;padding:12px;border-top:1px solid #241a10;background:#0c0a08}
.tx-input input{margin:0;border-radius:20px;padding:12px 16px}
.tx-input button{
  background:var(--gold);color:#1a120d;border:none;border-radius:50%;
  width:44px;height:44px;flex:none;font-size:1.3rem;cursor:pointer;font-weight:700;
}

/* ---------- ANIMATIONS ---------- */
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
@keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}

@media(min-width:560px){ .stats{gap:12px} }

</style></head><body><div id="game"></div>
<script>
/* ============================================================
   SUNDAY COUNTRY — ENGINE
   A small, dependency-free state machine for an authored
   branching narrative with real stats, flags, and consequence
   memory. Your writing lives in scenes.js; this file only
   moves numbers and decides what the player can see.
   ============================================================ */

const SC = (() => {

  /* ---------- DEFAULT STATE ---------- */
  // Everything that persists about a playthrough lives here.
  function freshState() {
    return {
      name: "The Kid",
      race: null,      // 'white' | 'black' | 'latino' | 'pi'
      cls: null,       // 'old' | 'middle' | 'working' | 'striver'
      scene: "title",
      age: 14,         // drives the texting maturity wall (Hard-R only at 18+)

      // Visible meters (0–100). These actually move now.
      stats: {
        coach:   24,   // Coach Trust
        respect: 16,   // Locker Room Respect
        heat:    18,   // Social Heat (fame/notoriety)
        ego:     22,   // Ego
        body:    100,  // Physical condition — drains, rarely refills
        money:   0,    // Wealth / NIL
      },

      // Hidden tracks the back half reads. Not shown as bars.
      tracks: {
        performance: 0,  // on-field penalty from romance/distraction (negative = worse)
        longevity:   0,  // padding past the NFL year-4 floor
        exposure:    0,  // betting/legal heat → jail track
      },

      // Hidden flags: who you've burned, what you owe, who trusts you.
      // Numeric so relationships can warm or sour over time.
      bonds: {
        lacey:   0,
        savannah:0,
        emma:    0,
        story:   0,   // NFL-era activist/nepo-baby romance
        mason:   0,   // left tackle — your line's loyalty barometer
        halberd: 0,   // coach
      },

      // One-shot story flags.
      flags: {
        tookBoosterCash: false,
        cleanNIL: false,
        usedPainMeds: false,
        bettingExposure: false,
        ghostedEmma: false,
        brandBoy: false,
        savannahRomance: false,
        storyRomance: false,
        storyExposed: false,   // hypocrisy detonator
        collegeTier: null,     // 'blueblood' | 'mid' | 'juco'
        drafted: null,         // true | false (set at the draft gate)
        wentHome: false,       // chose Emma / Cold River over the machine
      },

      // Append-only log the texting AI reads to know what you've done.
      history: [],
      entered: [],   // scene ids whose onEnter effects have fired (once each)
      careerYears: 0,    // NFL seasons banked (4 playable + longevity-driven extra)
      draftTeam: null,   // {name, roast} chosen at the draft
      seenQuests: [],    // side-quest ids already fired (no repeats in a career)

      // Unlocked texting threads. PG-13 in HS, Hard-R once adult.
      threads: { lacey: [], savannah: [], emma: [], story: [], gabriella: [] },

    };
  }

  let state = load() || freshState();

  /* ---------- PERSISTENCE ---------- */
  function save() {
    try { localStorage.setItem("sc_state_v13", JSON.stringify(state)); } catch (e) {}
  }
  function load() {
    try {
      const raw = localStorage.getItem("sc_state_v13");
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  }
  function reset() { state = freshState(); save(); }

  /* ---------- STAT / BOND MUTATION ---------- */
  function clamp(n, lo = 0, hi = 100) { return Math.max(lo, Math.min(hi, n)); }

  // Apply an effects object from a choice, e.g.
  // { coach:+6, ego:-4, bonds:{mason:+2}, flags:{cleanNIL:true}, note:"..." }
  function applyEffects(fx) {
    if (!fx) return;
    if (fx.stats) for (const k in fx.stats) {
      if (k in state.stats) state.stats[k] = clamp(state.stats[k] + fx.stats[k], 0, k === "body" ? 100 : 100);
    }
    if (fx.bonds) for (const k in fx.bonds) {
      if (k in state.bonds) state.bonds[k] = clamp(state.bonds[k] + fx.bonds[k], -100, 100);
    }
    if (fx.flags) for (const k in fx.flags) state.flags[k] = fx.flags[k];
    if (fx.tracks) for (const k in fx.tracks) {
      if (k in state.tracks) state.tracks[k] = state.tracks[k] + fx.tracks[k];
    }
    if (typeof fx.age === "number") state.age = fx.age;
    if (fx.note) state.history.push(fx.note);
    // Keep history from growing unbounded; the AI only needs recent texture.
    if (state.history.length > 40) state.history = state.history.slice(-40);
    save();
  }

  /* ---------- CHOICE GATING ---------- */
  // A choice may carry `requires`:
  //   - a function (s) => boolean
  //   - an object { check:(s)=>bool, reason:"why it's locked" }
  // Returns {ok, reason}. The reason shows on the locked button so a
  // burned bridge reads as a consequence, not a bug.
  function evalRequire(req) {
    if (!req) return { ok: true };
    if (typeof req === "function") {
      return req(state) ? { ok: true } : { ok: false, reason: "" };
    }
    if (typeof req === "object" && typeof req.check === "function") {
      return req.check(state) ? { ok: true } : { ok: false, reason: req.reason || "" };
    }
    return { ok: true };
  }

  /* ---------- RACE / CLASS RE-NARRATION ----------
     Authored text can embed tokens the engine swaps so the same
     beat reads differently by background, per your design note:
     "Race changes the story people tell about it."            */
  function lens(scene) {
    // scene.lens = { white:{...}, black:{...}, _default:{...} } overrides by id
    if (!scene.lens) return {};
    return scene.lens[state.race] || scene.lens._default || {};
  }

  /* ---------- TEXT INTERPOLATION ---------- */
  function fill(str) {
    if (!str) return "";
    return str.replace(/\{name\}/g, state.name);
  }

  /* ---------- DERIVED ROUTING ----------
     These read the meters and flags to decide trajectory. They are
     called from scene `route` choices so the player's whole history
     decides where the story can even go.                          */

  /* ---------- DICE ENGINE (hidden d20) ----------
     A risky choice carries a `roll` spec:
       roll: {
         mod: s => number,         // stat-based modifier to the d20
         dc: 12,                   // difficulty to clear
         crit: true,              // nat-20 = critical success, nat-1 = critical fail
         outcomes: {
           critSuccess: { goto, fx },   // optional; falls back to success
           success:     { goto, fx },
           fail:        { goto, fx },
           critFail:    { goto, fx },   // optional; falls back to fail
         }
       }
     The dice are HIDDEN: the engine resolves and hands back the chosen
     outcome plus the roll detail (for optional flavour), but the player
     just sees the narrated result.                                  */
  function d20() { return 1 + Math.floor(Math.random() * 20); }

  function resolveRoll(roll) {
    const natural = d20();
    const mod = (typeof roll.mod === "function") ? roll.mod(state) : (roll.mod || 0);
    const total = natural + mod;
    const dc = roll.dc != null ? roll.dc : 12;

    let key;
    if (roll.crit && natural === 20) key = "critSuccess";
    else if (roll.crit && natural === 1) key = "critFail";
    else key = total >= dc ? "success" : "fail";

    // Fallbacks: crit results default to their plain counterpart if undefined.
    const o = roll.outcomes;
    let chosen = o[key];
    if (!chosen && key === "critSuccess") chosen = o.success;
    if (!chosen && key === "critFail") chosen = o.fail;
    if (!chosen) chosen = o.success || o.fail;

    return { key, natural, mod, total, dc, outcome: chosen };
  }

  // Common modifier helpers scenes can compose.
  const MOD = {
    arm: s => Math.round((s.stats.coach - 50) / 8 + (s.stats.body - 60) / 10),
    poise: s => Math.round((s.stats.coach - 40) / 7 - (s.stats.ego - 40) / 12),
    legs: s => Math.round((s.stats.body - 50) / 8),
    nerve: s => Math.round((s.stats.ego - 30) / 10 + (s.stats.heat - 40) / 15),
    street: s => Math.round((s.stats.heat - 40) / 10 - (s.stats.coach - 50) / 12),
  };

  // College tier. Dirty money only caps you out of the very top NIL.
  function collegeTier() {
    const s = state.stats;
    // raw football capital
    let score = s.coach * 0.9 + s.respect * 0.8 + s.body * 0.5 + s.heat * 0.4 - s.ego * 0.2;
    if (state.flags.brandBoy) score += 6;          // fame helps recruiting optics
    if (state.bonds.halberd > 3) score += 8;       // a coach who'll vouch for you
    if (state.bonds.mason > 4) score += 4;
    if (score >= 130) return "blueblood";
    if (score >= 80)  return "mid";
    return "juco";
  }

  // Which kinds of school are actually offering. The PLAYER chooses among
  // the open ones; stats decide which doors are open. Returns a set of
  // booleans keyed by school path. Juco is always available (the floor).
  function recruitingOffers() {
    const s = state.stats;
    const cap = s.coach * 0.9 + s.respect * 0.8 + s.body * 0.5 + s.heat * 0.4 - s.ego * 0.2
              + (state.bonds.halberd > 3 ? 8 : 0) + (state.bonds.mason > 4 ? 4 : 0)
              + (state.flags.brandBoy ? 6 : 0);
    return {
      sec:   cap >= 120,                              // blue-blood football factory
      ivy:   s.coach >= 45 && s.ego <= 60,            // needs the "student" profile, not pure ego
      hbcu:  cap >= 70,                               // strong program, culture-dependent narration
      state: cap >= 60,                               // cold-weather state school, solid floor
      juco:  true,                                    // always the last chance
      _cap:  Math.round(cap),
    };
  }

  // Draft gate. Returns true if you make the NFL at all.
  function makesDraft() {
    const s = state.stats;
    let stock = s.coach * 0.6 + s.respect * 0.5 + s.body * 0.7 + s.heat * 0.15;
    stock += state.tracks.performance;            // romance penalties bite here
    if (state.flags.collegeTier === "blueblood") stock += 22;
    else if (state.flags.collegeTier === "mid")  stock += 6;
    else stock -= 12;                              // juco is a real disadvantage
    if (state.flags.usedPainMeds) stock -= 12;
    if (state.tracks.exposure > 20) stock -= 18;   // character-risk teardown
    if (state.bonds.mason > 4) stock += 4;         // line vouches for you
    return stock >= 105;
  }

  // Final ending id, calculated from the whole life.
  function resolveEnding() {
    const s = state.stats, f = state.flags, t = state.tracks, b = state.bonds;
    // Longevity (durability earned through smart choices) protects the body.
    const effBody = clamp(s.body + Math.max(0, t.longevity) * 2, 0, 100);
    // Jail track trumps most things — but it takes real, sustained exposure,
    // not one bad night. A pattern of it, or a single catastrophic level.
    if (t.exposure >= 55 || (f.bettingExposure && t.exposure >= 40)) return "end-probation";
    // Went home on purpose with Emma.
    if (f.wentHome && b.emma > 20) return "end-wenthome";
    // Pain-med ruin (pills + a worn body = the ghost).
    if (f.usedPainMeds && effBody < 60) return "end-ghost";
    // Broken legend — famous, long career, body paid the full price.
    if (s.heat > 55 && effBody < 55 && state.careerYears >= 10) return "end-hof";
    // Also a broken legend if simply famous and wrecked, even shorter.
    if (s.heat > 60 && effBody < 45) return "end-hof";
    // Clean long career → respected analyst.
    if (effBody > 55 && s.coach > 50 && t.longevity >= 4 && !f.usedPainMeds) return "end-analyst";
    // Status-chasing hollow wealth (brand/romance path, abandoned Emma).
    if (s.heat > 65 && (f.savannahRomance || f.storyRomance || f.brandBoy) && b.emma < 8) return "end-hollow";
    // Default: survived, diminished.
    return "end-coach";
  }

  // How many NFL years the career actually lasts. Four is the floor (you
  // played those); longevity + body + performance bank the rest, up to ~15.
  function bankCareerYears() {
    const s = state.stats, t = state.tracks, f = state.flags;
    let years = 4;                                   // the four playable seasons
    years += Math.max(0, Math.floor(t.longevity / 2));
    years += Math.max(0, Math.floor((s.body - 50) / 8));
    years += Math.max(0, Math.floor((s.coach - 50) / 12));
    if (f.usedPainMeds) years -= 3;
    if (t.exposure > 20) years -= 2;
    years = Math.max(4, Math.min(15, years));
    state.careerYears = years;
    save();
    return years;
  }

  // Pick the team that drafts you, by slot derived from stock. Lower stock =
  // worse team = better roast. Returns {name, roast, tier}.
  const DRAFT_BOARD = {
    // Contenders (high pick to a good team — the roast is gentler/ironic)
    contender: [
      { name: "the New Camelot Knights", roast: "A model franchise, which in this league means they'll break your heart with more dignity than the rest." },
      { name: "the Bay City Cabernets", roast: "Rich, smug, and perennially 'in the hunt.' You'll be very comfortable losing in the second round for a decade." },
    ],
    middling: [
      { name: "the Gulf Coast Humidity", roast: "A team whose entire identity is being warm and irrelevant. Like a parking lot that hosts football." },
      { name: "the Heartland Combine", roast: "Salt-of-the-earth fans, a stadium that smells like a tractor, and an owner who thinks analytics is a type of soup." },
      { name: "the Desert Mirage", roast: "Forty years old as a franchise and still feels like a preseason exhibition that never ended." },
    ],
    bottom: [
      { name: "the Lake Erie Mistakes", roast: "Brown helmets, brown jerseys, brown history — the color of their franchise, and of what they produce on the field. You poor bastard." },
      { name: "the Motor City Rust", roast: "A century of football and a trophy case you could store in a glovebox. The fans boo in a dialect scientists are still decoding." },
      { name: "the Swamp County Gators-That-Lose", roast: "An expansion team that has been expanding directly into the ground since the day it was founded." },
      { name: "the Prairie Wind", roast: "Named for the only thing that consistently shows up to home games. Forty thousand empty seats and a mascot that looks depressed." },
      { name: "the New Jersey Turnpike", roast: "Two teams share this stadium and somehow both are the worse one. You'll get booed by people who aren't even there to see you." },
    ],
  };

  function draftPlayer() {
    const s = state.stats;
    let stock = s.coach * 0.7 + s.respect * 0.5 + s.body * 0.7 + s.heat * 0.25
              + state.tracks.performance
              + (state.flags.collegeTier === "blueblood" ? 20 : state.flags.collegeTier === "juco" ? -10 : 5);
    if (state.flags.usedPainMeds) stock -= 10;
    if (state.tracks.exposure > 20) stock -= 12;
    let tier;
    if (stock >= 150) tier = "contender";
    else if (stock >= 115) tier = "middling";
    else tier = "bottom";
    const pool = DRAFT_BOARD[tier];
    const team = pool[Math.floor(Math.random() * pool.length)];
    state.draftTeam = { name: team.name, roast: team.roast, tier };
    save();
    return state.draftTeam;
  }

  // Romance resolution: reads the bonds the new beats move, returns a
  // capsule for each relationship's fate so the ending can narrate them.
  function resolveRomances() {
    const b = state.bonds, f = state.flags;
    const out = [];
    const judge = (who, val, lines) => {
      if (val >= 30) out.push(lines.good);
      else if (val <= -15) out.push(lines.bad);
      else if (val >= 8) out.push(lines.ok);
      // neutral/never-engaged: say nothing
    };
    judge("emma", b.emma, {
      good: "Emma married you, or didn't, but stayed — the one person who knew you before and after and chose the after anyway.",
      ok: "You and Emma never quite closed the distance, but she still picks up when you call, which is more than you've earned.",
      bad: "Emma stopped answering years ago. You see her tagged in photos sometimes, happy, with a man who was never on television.",
    });
    judge("lacey", b.lacey, {
      good: "Lacey is still around, still impossible, still the most honest liar you've ever loved. Nobody understands it. Neither do you.",
      ok: "Lacey drifts in and out — a text at 2am, a photo from somewhere expensive, a reminder that she's still keeping score.",
      bad: "Lacey sold the story. Of course she did. You'd have been disappointed if she hadn't.",
    });
    judge("savannah", b.savannah, {
      good: "Savannah is still your agent, still your something — the only person who priced you correctly and loved you anyway.",
      ok: "You and Savannah kept it professional in the end, mostly, which both of you pretend not to regret.",
      bad: "Savannah dropped you as a client and a human being in the same email, with a clause about the unpaid invoice.",
    });
    judge("story", b.story, {
      good: "Story is still posting, still funded by the fortune she dismantles for a living, still somehow yours. You've stopped naming the contradiction.",
      ok: "Story moved on to a cause and a man with better optics. You were a chapter in someone else's brand.",
      bad: "Story's people made sure the breakup was your fault in every outlet that mattered. The fortune bought a very clean narrative.",
    });
    return out;
  }

  /* ---------- PUBLIC API ---------- */
  return {
    get state() { return state; },
    freshState, save, load, reset,
    applyEffects, evalRequire, clamp, lens, fill,
    collegeTier, makesDraft, resolveEnding, bankCareerYears, draftPlayer,
    resolveRomances,
    recruitingOffers,
    resolveRoll, MOD,
    setName(v) { state.name = (v || "The Kid").slice(0, 40); save(); },
    setRace(r) { state.race = r; save(); },
    setClass(c) { state.cls = c; save(); },
    setAge(n) { state.age = n; save(); },
    goto(id) { state.scene = id; save(); },
    unlockThread(who) { if (!state.threads[who]) { state.threads[who] = []; save(); } },
    // Draw a random side-quest id not yet seen this career, from a pool.
    // Returns the id (and marks it seen), or null if the pool's exhausted.
    drawQuest(pool) {
      if (!state.seenQuests) state.seenQuests = [];
      const fresh = pool.filter(id => !state.seenQuests.includes(id));
      if (!fresh.length) return null;
      const pick = fresh[Math.floor(Math.random() * fresh.length)];
      state.seenQuests.push(pick);
      save();
      return pick;
    },
    applyOnEnterOnce(id, fx) {
      if (!state.entered) state.entered = [];
      if (state.entered.includes(id)) return;
      state.entered.push(id);
      applyEffects(fx);
    },
    // Resolve a "route" choice: pick a goto from a map by a key fn.
    routeTo(map, key) { return map[key] || map._default; },
  };
})();

</script>
<script>
/* ============================================================
   SUNDAY COUNTRY — GAME-DAY ENGINE
   A reusable football sim that runs ON TOP of the dice engine.
   A scene hands it a drive scenario; it plays out down-by-down
   with four play-calls per snap (each showing its risk/reward),
   rolls the hidden d20 modified by the player's stats, narrates
   the result, and reports the drive outcome back to the story.

   The football and the life-sim run in parallel: scenes invoke
   GAMEDAY.start(scenario, onComplete) and get a result object.
   ============================================================ */

const GAMEDAY = (() => {

  /* ---------- PLAY-CALL ARCHETYPES ----------
     Each play shows the player its risk/reward BEFORE they pick.
     dcBase = difficulty; gain = yards on success; the modifier
     function pulls from the player's stats so a better QB wins more.
     bust = what a failure/critFail does to the drive + body.        */
  const PLAYS = {
    handoff: {
      label: "Hand it off",
      blurb: "Safe. Short, reliable yards. Almost never a disaster.",
      dc: 7, gain: [3, 6], mod: s => SC.MOD.poise(s),
      bustYards: [-1, 1], crit: false, bodyRisk: 0,
    },
    checkdown: {
      label: "Checkdown",
      blurb: "Low risk. Take what the defense gives. Keeps the chains moving.",
      dc: 9, gain: [5, 12], mod: s => SC.MOD.poise(s),
      bustYards: [0, 0], crit: false, bodyRisk: 0,
    },
    intermediate: {
      label: "Work the intermediate route",
      blurb: "Balanced. Real yards if you read it right; a hit if you don't.",
      dc: 11, gain: [11, 21], mod: s => SC.MOD.arm(s),
      bustYards: [0, 0], crit: true, bodyRisk: 2, intRisk: true,
    },
    deep: {
      label: "Take the shot deep",
      blurb: "Boom or bust. Explosive if it hits — can be picked or housed if it misses.",
      dc: 16, gain: [25, 45], mod: s => SC.MOD.arm(s),
      bustYards: [0, 0], crit: true, bodyRisk: 1, intRisk: true, explosive: true,
    },
    scramble: {
      label: "Tuck it and run",
      blurb: "Your legs. Decent yards, but you take the hit. Costs the body.",
      dc: 12, gain: [6, 14], mod: s => SC.MOD.legs(s),
      bustYards: [-2, 2], crit: true, bodyRisk: 5,
    },
    heroball: {
      label: "Hero ball — extend the play, make something from nothing",
      blurb: "High risk. A legend-maker if it works. A catastrophe if you roll a 1.",
      dc: 17, gain: [15, 50], mod: s => SC.MOD.nerve(s),
      bustYards: [0, 0], crit: true, bodyRisk: 4, intRisk: true, explosive: true,
    },
    qbsneak: {
      label: "QB sneak",
      blurb: "Short yardage only. Almost automatic for a yard. You take a pile-up.",
      dc: 7, gain: [1, 2], mod: s => SC.MOD.legs(s),
      bustYards: [0, 0], crit: false, bodyRisk: 3,
    },
    kneel: {
      label: "Kneel / burn clock",
      blurb: "Give up the down to drain the clock. Protects a lead.",
      dc: 0, gain: [-1, 0], mod: () => 0, bustYards: [0, 0], crit: false, bodyRisk: 0,
      clockOnly: true,
    },
  };

  // Which plays are offered for a given situation (always 4, situational).
  function callsFor(drive) {
    const togo = drive.togo;
    // Short yardage
    if (togo <= 2) return ["qbsneak", "handoff", "intermediate", "deep"];
    // Obvious passing down
    if (togo >= 8) return ["checkdown", "intermediate", "deep", "heroball"];
    // Protecting a late lead
    if (drive.protectLead) return ["kneel", "handoff", "checkdown", "scramble"];
    // Standard down
    return ["handoff", "intermediate", "scramble", "deep"];
  }

  let drive = null;
  let onComplete = null;
  let log = [];

  /* ---------- ROUND TIERS ----------
     The postseason gets harder two ways (design choice B): the defense
     is stiffer (DC bump) AND mistakes bite harder (penalty multiplier
     applied to stat losses by the calling scene).                    */
  const ROUNDS = {
    regular:      { dcBump: 0, penalty: 1.0, defe: "a conference defense" },
    playoff:      { dcBump: 1, penalty: 1.5, defe: "a playoff defense that's seen your film" },
    championship: { dcBump: 2, penalty: 2.0, defe: "the best defense you'll ever face" },
  };

  /* ---------- DRIVE LIFECYCLE ---------- */
  // scenario: { label, ball, maxPlays, score, clock, mustScore,
  //   protectLead, round:"regular|playoff|championship",
  //   needYards (yards needed to "win" the possession; default = reach 100) }
  function start(scenario, complete) {
    const round = ROUNDS[scenario.round] || ROUNDS.regular;
    drive = {
      label: scenario.label || "The Drive",
      ball: scenario.ball != null ? scenario.ball : 45,
      startBall: scenario.ball != null ? scenario.ball : 45,
      down: 1, togo: 10,
      plays: 0,
      maxPlays: scenario.maxPlays || (scenario.round && scenario.round !== "regular" ? 8 : 4),
      score: scenario.score || { us: 0, them: 0 },
      clock: scenario.clock || 120,
      mustScore: !!scenario.mustScore,
      protectLead: !!scenario.protectLead,
      round: scenario.round || "regular",
      dcBump: round.dcBump,
      penalty: round.penalty,
      // "Winning" a possession: score a TD, OR for short regular-season games,
      // gain at least needYards of field. Default need = reach the end zone.
      needYards: scenario.needYards != null ? scenario.needYards : null,
      result: null,
    };
    onComplete = complete;
    log = [];
    return drive;
  }

  function current() { return drive; }
  function getLog() { return log; }

  function playOptions() {
    return callsFor(drive).map(id => ({ id, ...PLAYS[id] }));
  }

  function rnd([lo, hi]) { return lo + Math.floor(Math.random() * (hi - lo + 1)); }

  // Resolve one play call. Returns a result beat for narration.
  function runPlay(playId) {
    const p = PLAYS[playId];
    const mod = (typeof p.mod === "function") ? p.mod(SC.state) : 0;
    const natural = 1 + Math.floor(Math.random() * 20);
    const total = natural + mod;
    const dc = p.dc + (drive.dcBump || 0);   // postseason defenses are stiffer

    let kind, yards = 0, turnover = false, bodyHit = 0, narrate = "";

    if (p.clockOnly) {
      kind = "clock";
      yards = rnd(p.gain);
      narrate = "You drain the clock. The defense can only watch.";
    } else if (p.crit && natural === 20) {
      kind = "critWin";
      yards = rnd(p.gain) + (p.explosive ? 15 : 6);
      bodyHit = 0;
      narrate = p.explosive
        ? "Perfect. You uncork it and it drops in a bucket — the kind of throw they replay for a decade."
        : "Picture-perfect execution. Everything clicks.";
    } else if (p.crit && natural === 1) {
      kind = "critFail";
      bodyHit = p.bodyRisk + 4;
      if (p.intRisk && p.explosive) {
        turnover = true;
        narrate = "Catastrophe. You hang it up for grabs and the corner takes it the other way — pick-six, the whole stadium groaning.";
      } else if (p.intRisk) {
        // Intermediate disaster: not always a pick — usually a brutal sack/strip risk.
        if (Math.random() < 0.5) { turnover = true; narrate = "Disaster. The ball's tipped at the line and a linebacker reels it in. Turnover."; }
        else { yards = -8; narrate = "It blows up — you eat a sack for a huge loss and barely hold onto the ball."; }
      } else {
        yards = -6;
        narrate = "It blows up at the snap. A free rusher buries you for a big loss.";
      }
    } else if (total >= dc) {
      kind = "win";
      yards = rnd(p.gain);
      bodyHit = Math.max(0, p.bodyRisk - 1);
      narrate = `You execute. ${yards} yards.`;
    } else {
      kind = "fail";
      bodyHit = p.bodyRisk;
      if (p.intRisk && (dc - total) >= 9) {
        turnover = true;
        narrate = "The read's wrong and the defender's there. Intercepted.";
      } else {
        yards = rnd(p.bustYards);
        narrate = yards < 0
          ? `Pressure gets home. Sack, loss of ${Math.abs(yards)}.`
          : "Nothing there. Incomplete, or stuffed at the line.";
      }
    }

    // Apply body cost immediately (football wears you down in real time).
    // Scaled down: a full career is ~32 games of plays, so each hit is small;
    // the body is wrecked by bad CHOICES (pills, hero-ball, no rest), not volume.
    if (bodyHit > 0) SC.applyEffects({ stats: { body: -Math.max(1, Math.round(bodyHit * 0.4)) } });

    // Advance drive state.
    drive.plays++;
    drive.ball = Math.max(0, Math.min(100, drive.ball + yards));
    if (!p.clockOnly) {
      if (yards >= drive.togo) { drive.down = 1; drive.togo = 10; }
      else { drive.down++; drive.togo -= yards; }
    }
    drive.clock = Math.max(0, drive.clock - rnd([18, 40]));

    const beat = { kind, yards, turnover, narrate, playLabel: p.label, natural };
    log.push(beat);

    // Check terminal conditions.
    let done = null;
    if (turnover) done = "turnover";
    else if (drive.ball >= 100) done = "touchdown";
    else if (drive.down > 4) done = "downs";
    else if (drive.plays >= drive.maxPlays) done = "exhausted";
    else if (drive.clock <= 0) done = "clock";

    if (done) finish(done, beat);
    return { beat, done };
  }

  function finish(reason, lastBeat) {
    // Translate the drive into a result the story can use.
    const scored = reason === "touchdown";
    const fgRange = drive.ball >= 65 && !scored;
    const gained = drive.ball - drive.startBall;

    let outcome;            // narrative flavour of how the drive ended
    if (scored) outcome = "td";
    else if (reason === "turnover") outcome = "turnover";
    else if (fgRange) outcome = "fg";
    else outcome = "stop";

    // WIN/LOSS gate for the season gauntlet (design: lose → season ends):
    //  - REGULAR season: your team carries you; only a turnover loses the game.
    //    A stall or punt is fine (the defense holds, you win ugly).
    //  - PLAYOFF/CHAMPIONSHIP: you must deliver — a TD or FG-range drive wins;
    //    a stall, downs, or turnover all lose.
    let won;
    if (drive.round === "regular") {
      won = reason !== "turnover";
    } else if (drive.needYards != null) {
      won = scored || gained >= drive.needYards;
      if (reason === "turnover") won = false;
    } else {
      won = (scored || fgRange) && reason !== "turnover";
    }

    drive.result = {
      reason, outcome, scored, fgRange, won,
      ball: drive.ball, gained, plays: drive.plays,
      round: drive.round, penalty: drive.penalty,
    };
  }

  function consume() {
    const r = drive ? drive.result : null;
    return r;
  }

  return { start, current, playOptions, runPlay, getLog, consume, PLAYS, ROUNDS };
})();

</script>

// Dynamic body for career-resolve: report the actual career length.
SCENES["career-resolve"].bodyFn = () => {
  const years = SC.bankCareerYears();
  const team = SC.state.draftTeam ? SC.state.draftTeam.name : "the league";
  let line;
  if (years >= 14) line = `Fifteen seasons. A first-ballot kind of number. Your body kept almost all of its promises and you kept showing up, Sunday after Sunday, for a decade and a half.`;
  else if (years >= 10) line = `${years} seasons in the league — a long, real career. Most men get a cup of coffee; you got a whole pot.`;
  else if (years >= 7) line = `${years} solid seasons. A good career, the kind that buys a house and a little peace, if you were careful.`;
  else line = `${years} seasons, and then the phone stopped ringing. You made it past the cut line and not a great deal further. In this league, that still makes you one of the rare ones.`;
  return [
    `It ends the way it ends for everyone eventually. You came into ${team} a rookie with a famous arm, and you leave the game on its terms, not yours.`,
    line,
    ...SC.resolveRomances(),
  ];
};

<script>
/* ============================================================
   SUNDAY COUNTRY — APP / RENDERER
   Draws scenes, animates stats, runs the live texting overlay.
   ============================================================ */

// Where the texting proxy lives. Same-origin "/api/chat" works once
// deployed on Vercel. If you ever host the proxy elsewhere, set this.
const API_BASE = (window.SC_API_BASE || "/api/chat");

// Threads now unlock as characters are introduced in the story
// (via each scene's `unlock` list). Set true only to force-open all.
const TEST_TEXTING = false;

const STAT_LABELS = {
  coach: "Coach Trust", respect: "Locker Room Respect",
  heat: "Social Heat", ego: "Ego", body: "Body", money: "Money",
};

const root = document.getElementById("game");

/* ---------- TITLE / RESUME ---------- */
function renderTitle() {
  const hasSave = !!SC.load() && SC.state.scene !== "title";
  root.innerHTML = `
    <section class="hero">
      <div class="hero-inner">
        <h1 class="title-mark">Sunday<br>Country</h1>
        <p class="tagline">A football life where the sport is the pressure cooker and the off-field life is the game.</p>
        <div class="title-actions">
          ${hasSave ? `<button class="choice primary" data-act="resume">Continue Career</button>` : ``}
          <button class="choice" data-act="new">${hasSave ? "New Career" : "Start Career"}</button>
          <button class="choice ghost" data-act="copyright">Copyright Disclaimer</button>
        </div>
      </div>
    </section>`;
  root.querySelector('[data-act="new"]').onclick = () => { SC.reset(); SC.goto("name"); renderName(); };
  if (hasSave) root.querySelector('[data-act="resume"]').onclick = () => renderScene(SC.state.scene);
  root.querySelector('[data-act="copyright"]').onclick = renderCopyright;
}

function renderCopyright() {
  root.innerHTML = card(`
    <h2>Copyright Disclaimer</h2>
    <p>© 2026 Sunday Country. All characters, fictional schools, systems, dialogue, relationship arcs, headlines, gameplay structures and written material are original creative content.</p>
    <button class="choice" data-act="back">Return To Title Screen</button>`);
  root.querySelector('[data-act="back"]').onclick = renderTitle;
}

function renderName() {
  root.innerHTML = card(`
    <h2>Name Your Quarterback</h2>
    <input id="pname" placeholder="e.g. Tommy Johnson" maxlength="40" autocomplete="off">
    <button class="choice primary" data-act="go">Continue</button>`);
  const input = root.querySelector("#pname");
  input.focus();
  const go = () => { SC.setName(input.value); SC.goto("race"); renderScene("race"); };
  root.querySelector('[data-act="go"]').onclick = go;
  input.addEventListener("keydown", e => { if (e.key === "Enter") go(); });
}

/* ---------- SCENE RENDERER ---------- */
function renderScene(id) {
  const sc = SCENES[id];
  if (!sc) { console.warn("missing scene", id); return; }
  SC.goto(id);

  // Scene can set the player's age (drives texting maturity wall)
  if (typeof sc.age === "number") SC.setAge(sc.age);
  // Scene can introduce characters, unlocking their text thread.
  if (sc.unlock) sc.unlock.forEach(w => SC.unlockThread(w));
  // Scene can apply automatic effects on entry (seasons taxing the body, etc.),
  // applied at most once per playthrough.
  if (sc.onEnter) SC.applyOnEnterOnce(id, sc.onEnter);

  // A "questDraw" scene pulls a random unseen side quest then continues.
  if (sc.questDraw) {
    QUEST_RETURN = sc.questDraw.then;
    const pick = SC.drawQuest(sc.questDraw.pool);
    renderScene(pick || sc.questDraw.then);
    return;
  }

  // A "gameday" scene hands control to the football sim (single drive).
  if (sc.gameday) { startGameday(sc); return; }

  // A "season" scene runs the four-game gauntlet (2 regular, playoff, championship).
  if (sc.season) { startSeason(sc); return; }

  const L = SC.lens(sc);
  let html = "";

  if (sc.showStats) html += statBlock();

  if (sc.title) html += `<h2>${SC.fill(sc.title)}</h2>`;

  // Optional race-lensed intro paragraph rendered before the body.
  if (sc.bodyLensKey && sc.bodyLensFirst) {
    const intro = L[sc.bodyLensKey];
    if (intro) html += `<p>${SC.fill(intro)}</p>`;
  }

  (sc.body || []).forEach(p => html += `<p>${SC.fill(p)}</p>`);

  // Optional dynamic body (computed at render time).
  if (typeof sc.bodyFn === "function") {
    (sc.bodyFn() || []).forEach(p => html += `<p>${SC.fill(p)}</p>`);
  }

  // World box (radio/text), with optional race-lens override or dynamic fn.
  if (sc.world) {
    let wt = sc.worldLensKey ? (L[sc.worldLensKey] || sc.worldText) : sc.worldText;
    if (sc.worldFn) { try { wt = sc.worldFn() || wt; } catch (e) {} }
    html += `<div class="world">${SC.fill(sc.world)}<br>${SC.fill(wt || "")}</div>`;
  }
  (sc.body2 || []).forEach(p => html += `<p>${SC.fill(p)}</p>`);

  if (sc.sub) html += `<h3>${SC.fill(sc.sub)}</h3>`;

  // Choices, with gating.
  sc.choices.forEach((c, i) => {
    const gate = SC.evalRequire(c.requires);
    const disabled = gate.ok ? "" : "disabled";
    const lockNote = (!gate.ok && gate.reason)
      ? `<span class="lock-reason">${SC.fill(gate.reason)}</span>` : "";
    html += `<button class="choice ${disabled}" data-i="${i}" ${disabled}>${SC.fill(c.text)}${lockNote}</button>`;
  });

  // Texting entry points appear once a thread is unlocked.
  html += threadLauncher();

  root.innerHTML = card(html);

  // Animate any stat bars from 0 → value.
  requestAnimationFrame(() => {
    root.querySelectorAll(".fill").forEach(f => { f.style.width = f.dataset.w + "%"; });
  });

  sc.choices.forEach((c, i) => {
    const btn = root.querySelector(`[data-i="${i}"]`);
    if (!btn || btn.hasAttribute("disabled")) return;
    btn.onclick = () => choose(c);
  });

  // Wire thread launchers.
  root.querySelectorAll("[data-thread]").forEach(b => {
    b.onclick = () => openThread(b.dataset.thread);
  });

  window.scrollTo(0, 0);
}

function choose(c) {
  if (c.set) {
    if (c.set.race) SC.setRace(c.set.race);
    if (c.set.cls)  SC.setClass(c.set.cls);
  }
  // Apply any base effects the choice always has.
  SC.applyEffects(c.fx);
  if (c.restart) { SC.reset(); renderTitle(); return; }

  // Risky choice: resolve the hidden d20, apply the matched outcome, then
  // show a short narrated result beat before continuing.
  if (c.roll) {
    const r = SC.resolveRoll(c.roll);
    SC.applyEffects(r.outcome.fx);
    const dest = (typeof r.outcome.route === "function")
      ? r.outcome.route(SC.state) : resolveGoto(r.outcome.goto);
    renderRollResult(r, dest);
    return;
  }

  const dest = (typeof c.route === "function") ? c.route(SC.state) : resolveGoto(c.goto);
  renderScene(dest);
}

// A brief interstitial that narrates a dice outcome without showing dice.
function renderRollResult(r, dest) {
  const o = r.outcome;
  const tone = r.key === "critFail" ? "rr-critfail"
             : r.key === "fail"     ? "rr-fail"
             : r.key === "critSuccess" ? "rr-critwin"
             : "rr-win";
  const html = `
    <div class="roll-result ${tone}">
      <p>${SC.fill(o.text || "...")}</p>
    </div>
    <button class="choice primary" data-cont="1">Continue</button>`;
  root.innerHTML = card(html);
  root.querySelector('[data-cont]').onclick = () => renderScene(dest);
  window.scrollTo(0, 0);
}

/* ---------- GAME-DAY FOOTBALL SIM ---------- */
function startGameday(sc) {
  GAMEDAY.start(sc.gameday, null);
  // optional scripted intro beat
  gamedayIntro = sc.gameday.intro || null;
  gamedayResults = sc.gameday.results || {};   // { td, fg, stop, turnover } -> {text, goto, fx}
  renderDrive(true);
}

let gamedayIntro = null;
let gamedayResults = {};
let QUEST_RETURN = null;   // where a drawn side quest routes back to

// Resolve a goto, translating the _questReturn token to the stored return point.
function resolveGoto(dest) {
  return dest === "_questReturn" ? (QUEST_RETURN || "career-resolve") : dest;
}

function fieldStrip(d) {
  // Visual: ball position on a 0–100 field, down & distance, score.
  const pct = Math.max(2, Math.min(98, d.ball));
  const side = d.ball <= 50 ? "OWN " + d.ball : "OPP " + (100 - d.ball);
  const ord = ["1st", "2nd", "3rd", "4th"][Math.min(3, d.down - 1)];
  return `
    <div class="gd-status">
      <div class="gd-line"><span>${ord} & ${d.togo <= 0 ? "goal" : d.togo}</span><span>${side} yd</span><span>US ${d.score.us}–${d.score.them} THEM</span></div>
      <div class="gd-field"><div class="gd-ball" style="left:${pct}%"></div></div>
    </div>`;
}

function renderDrive(first) {
  const d = GAMEDAY.current();
  let html = fieldStrip(d);
  html += `<h2>${SC.fill(d.label)}</h2>`;
  if (first && gamedayIntro) gamedayIntro.forEach(p => html += `<p>${SC.fill(p)}</p>`);

  // last beat narration
  const log = GAMEDAY.getLog();
  if (log.length) {
    const b = log[log.length - 1];
    const tone = b.kind === "critFail" ? "rr-critfail" : b.kind === "fail" ? "rr-fail"
               : b.kind === "critWin" ? "rr-critwin" : "rr-win";
    html += `<div class="roll-result ${tone}"><p><strong>${b.playLabel}.</strong> ${SC.fill(b.narrate)}</p></div>`;
  }

  html += `<h3>Your call:</h3>`;
  const opts = GAMEDAY.playOptions();
  opts.forEach((o, i) => {
    html += `<button class="choice gd-call" data-play="${o.id}">
      ${o.label}<span class="gd-blurb">${o.blurb}</span></button>`;
  });

  root.innerHTML = card(html);
  opts.forEach(o => {
    const btn = root.querySelector(`[data-play="${o.id}"]`);
    if (btn) btn.onclick = () => {
      const { done } = GAMEDAY.runPlay(o.id);
      if (done) finishDrive();
      else renderDrive(false);
    };
  });
  window.scrollTo(0, 0);
}

function finishDrive() {
  const r = GAMEDAY.consume();
  const d = GAMEDAY.current();
  const log = GAMEDAY.getLog();
  const lastBeat = log[log.length - 1];

  // Headline for the drive's end.
  const headlines = {
    td: "TOUCHDOWN.",
    fg: "The drive stalls in range — the kicker trots on.",
    stop: "The drive dies. Punt team out.",
    turnover: "Turnover. The worst way for it to end.",
  };
  const tone = (r.outcome === "td") ? "rr-critwin"
             : (r.outcome === "turnover") ? "rr-critfail"
             : (r.outcome === "fg") ? "rr-win" : "rr-fail";

  // Pull the matching story result (text/goto/fx the scene author supplied).
  const res = gamedayResults[r.outcome] || gamedayResults.stop || {};
  SC.applyEffects(res.fx);

  let html = fieldStrip(d);
  html += `<div class="roll-result ${tone}"><p><strong>${headlines[r.outcome]}</strong></p></div>`;
  if (lastBeat) html += `<p>${SC.fill(lastBeat.narrate)}</p>`;
  if (res.text) html += `<p>${SC.fill(res.text)}</p>`;
  html += `<button class="choice primary" data-cont="1">Continue</button>`;

  root.innerHTML = card(html);
  root.querySelector('[data-cont]').onclick = () => renderScene(res.goto);
  window.scrollTo(0, 0);
}

/* ---------- SEASON GAUNTLET ----------
   A season scene declares:
   season: {
     name: "Sophomore Year", team: "Cold River",
     intro: [ ... ],                       // optional opening text
     onWinAll: { goto, text, fx },         // won the championship
     onLoss:   { goto, text, fx },         // lost any game → season ends
     games: [                              // exactly 4: 2 regular, playoff, champ
       { round:"regular", opp:"...", label:"...", ball, score, win:{text,fx}, ... },
       ...
     ]
   }
   Each game is a short possession; lose one and the season ends early.
   Postseason rounds raise the DC and multiply the stat penalty on a loss. */
let SEASON = null;

function startSeason(sc) {
  SEASON = {
    def: sc.season,
    idx: 0,
    wins: 0,
  };
  // Optional season intro screen before kickoff.
  if (sc.season.intro) {
    let html = "";
    if (sc.showStats) html += statBlock();
    html += `<h2>${SC.fill(sc.season.name)}</h2>`;
    sc.season.intro.forEach(p => html += `<p>${SC.fill(p)}</p>`);
    html += `<button class="choice primary" data-cont="1">Kickoff →</button>`;
    root.innerHTML = card(html);
    root.querySelector('[data-cont]').onclick = () => playSeasonGame();
    window.scrollTo(0, 0);
  } else {
    playSeasonGame();
  }
}

const ROUND_LABEL = { regular: "Regular Season", playoff: "Playoff", championship: "Championship" };

function playSeasonGame() {
  const g = SEASON.def.games[SEASON.idx];
  GAMEDAY.start({
    label: g.label || `${ROUND_LABEL[g.round] || "Game"} — vs. ${g.opp || "the opponent"}`,
    ball: g.ball, maxPlays: g.maxPlays,
    score: g.score, clock: g.clock,
    round: g.round, needYards: g.needYards, mustScore: g.mustScore,
  });
  seasonIntroBeat = g.intro || null;
  renderSeasonDrive(true);
}

let seasonIntroBeat = null;

function renderSeasonDrive(first) {
  const d = GAMEDAY.current();
  const g = SEASON.def.games[SEASON.idx];
  let html = "";
  // Season scoreboard: which game, record so far, round badge.
  html += `<div class="season-bar">
    <span>${SC.fill(SEASON.def.name)}</span>
    <span class="season-game">Game ${SEASON.idx + 1} of 4 · ${ROUND_LABEL[g.round]}</span>
    <span>${SEASON.wins}–${SEASON.idx - SEASON.wins}</span>
  </div>`;
  if (g.round !== "regular") {
    html += `<div class="season-warn">${g.round === "championship" ? "CHAMPIONSHIP — the defense is the best you'll ever face, and a mistake here costs double." : "PLAYOFF — they've studied your film. Tougher, and failure bites harder."}</div>`;
  }
  html += fieldStrip(d);
  html += `<h2>${SC.fill(d.label)}</h2>`;
  if (first && seasonIntroBeat) seasonIntroBeat.forEach(p => html += `<p>${SC.fill(p)}</p>`);

  const log = GAMEDAY.getLog();
  if (log.length) {
    const b = log[log.length - 1];
    const tone = b.kind === "critFail" ? "rr-critfail" : b.kind === "fail" ? "rr-fail"
               : b.kind === "critWin" ? "rr-critwin" : "rr-win";
    html += `<div class="roll-result ${tone}"><p><strong>${b.playLabel}.</strong> ${SC.fill(b.narrate)}</p></div>`;
  }

  html += `<h3>Your call:</h3>`;
  const opts = GAMEDAY.playOptions();
  opts.forEach(o => {
    html += `<button class="choice gd-call" data-play="${o.id}">${o.label}<span class="gd-blurb">${o.blurb}</span></button>`;
  });
  root.innerHTML = card(html);
  opts.forEach(o => {
    const btn = root.querySelector(`[data-play="${o.id}"]`);
    if (btn) btn.onclick = () => {
      const { done } = GAMEDAY.runPlay(o.id);
      if (done) finishSeasonGame();
      else renderSeasonDrive(false);
    };
  });
  window.scrollTo(0, 0);
}

function finishSeasonGame() {
  const r = GAMEDAY.consume();
  const g = SEASON.def.games[SEASON.idx];
  const d = GAMEDAY.current();
  const log = GAMEDAY.getLog();
  const lastBeat = log[log.length - 1];

  let html = "";
  html += `<div class="season-bar"><span>${SC.fill(SEASON.def.name)}</span><span class="season-game">${ROUND_LABEL[g.round]}</span><span></span></div>`;
  html += fieldStrip(d);

  if (r.won) {
    SEASON.wins++;
    // Per-game win reward (optional), scaled up a touch in the postseason.
    if (g.win && g.win.fx) SC.applyEffects(g.win.fx);
    const tone = r.outcome === "td" ? "rr-critwin" : "rr-win";
    html += `<div class="roll-result ${tone}"><p><strong>WIN.</strong> ${SC.fill((g.win && g.win.text) || "You get it done. On to the next.")}</p></div>`;
    if (lastBeat) html += `<p>${SC.fill(lastBeat.narrate)}</p>`;

    const isLast = SEASON.idx >= SEASON.def.games.length - 1;
    if (isLast) {
      // Won the championship.
      const w = SEASON.def.onWinAll || {};
      SC.applyEffects(w.fx);
      html += `<div class="roll-result rr-critwin"><p>${SC.fill(w.text || "Champions. They'll remember this team forever.")}</p></div>`;
      html += `<button class="choice primary" data-next="${w.goto}">Continue →</button>`;
      root.innerHTML = card(html);
      root.querySelector('[data-next]').onclick = () => renderScene(w.goto);
    } else {
      html += `<button class="choice primary" data-adv="1">Next game →</button>`;
      root.innerHTML = card(html);
      root.querySelector('[data-adv]').onclick = () => { SEASON.idx++; playSeasonGame(); };
    }
  } else {
    // LOSS → season ends. Apply the loss penalty, scaled by round.
    const pen = r.penalty || 1;
    const loss = SEASON.def.onLoss || {};
    // Scale the negative fx by the postseason penalty multiplier.
    const scaledFx = scaleFx(loss.fx, pen);
    SC.applyEffects(scaledFx);
    const tone = r.outcome === "turnover" ? "rr-critfail" : "rr-fail";
    html += `<div class="roll-result ${tone}"><p><strong>LOSS.</strong> ${SC.fill((g.loss && g.loss.text) || "It ends here. The season's over.")}</p></div>`;
    if (lastBeat) html += `<p>${SC.fill(lastBeat.narrate)}</p>`;
    if (g.round !== "regular") html += `<p class="season-warn">A ${g.round} loss like this leaves a mark that doesn't fade by spring.</p>`;
    if (loss.text) html += `<div class="roll-result ${tone}"><p>${SC.fill(loss.text)}</p></div>`;
    html += `<button class="choice primary" data-next="${loss.goto}">Continue →</button>`;
    root.innerHTML = card(html);
    root.querySelector('[data-next]').onclick = () => renderScene(loss.goto);
  }
  window.scrollTo(0, 0);
}

// Multiply only the NEGATIVE stat/track effects by the postseason penalty,
// so a championship collapse genuinely hurts more than a week-1 one.
function scaleFx(fx, mult) {
  if (!fx || mult === 1) return fx;
  const out = JSON.parse(JSON.stringify(fx));
  ["stats", "tracks"].forEach(grp => {
    if (out[grp]) for (const k in out[grp]) {
      if (out[grp][k] < 0) out[grp][k] = Math.round(out[grp][k] * mult);
    }
  });
  return out;
}

/* ---------- STAT BLOCK ---------- */
function statBlock() {
  const s = SC.state.stats;
  const order = ["coach", "respect", "heat", "ego"];
  // body/money only shown once they matter
  if (s.body < 100) order.push("body");
  if (s.money > 0) order.push("money");
  let h = `<div class="stats">`;
  order.forEach(k => {
    h += `<div class="stat">
      <span class="stat-label">${STAT_LABELS[k]}</span>
      <div class="bar"><div class="fill" data-w="${s[k]}" style="width:0%"></div></div>
    </div>`;
  });
  h += `</div>`;
  return h;
}

/* ---------- TEXTING (live, AI-backed) ---------- */
const CHARACTERS = {
  lacey:    { name: "Lacey Mercer",  hue: "#c79a4a" },
  savannah: { name: "Savannah Vale", hue: "#c2557a" },
  emma:     { name: "Emma",          hue: "#7fa3a0" },
  story:    { name: "Story Ellison", hue: "#8a7fbf" },
gabreiella: { name: "Gabriella Lopez", hue: "#9a7fbf" },
};

function threadLauncher() {
  // Threads unlock as characters are introduced (scenes call SC.unlockThread).
  // In test mode we additionally surface whoever's been introduced so far.
  const open = Object.keys(SC.state.threads);
  if (!open.length) return "";
  const adult = SC.state.age >= 18;
  let h = `<div class="thread-launch"><span class="small">Messages${adult ? "" : " (keep it clean — you're 16)"}</span>`;
  open.forEach(w => {
    h += `<button class="choice text-btn" data-thread="${w}">💬 ${CHARACTERS[w]?.name || w}</button>`;
  });
  h += `</div>`;
  return h;
}

let activeThread = null;

function openThread(who) {
  activeThread = who;
  const ch = CHARACTERS[who];
  const msgs = SC.state.threads[who] || [];
  let bubbles = msgs.map(m => bubble(m.role, m.content)).join("");
  if (!msgs.length) bubbles = `<div class="sys">This is the start of your thread with ${ch.name}.</div>`;

  const overlay = document.createElement("div");
  overlay.className = "tx-overlay";
  overlay.innerHTML = `
    <div class="tx-sheet" style="--hue:${ch.hue}">
      <div class="tx-head">
        <button class="tx-close" aria-label="Close">‹</button>
        <span class="tx-name">${ch.name}</span>
        <span class="tx-dot"></span>
      </div>
      <div class="tx-body" id="txBody">${bubbles}</div>
      <div class="tx-input">
        <input id="txField" placeholder="Message…" autocomplete="off">
        <button id="txSend" aria-label="Send">↑</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  const body = overlay.querySelector("#txBody");
  const field = overlay.querySelector("#txField");
  body.scrollTop = body.scrollHeight;
  field.focus();

  overlay.querySelector(".tx-close").onclick = () => overlay.remove();
  const send = () => sendText(who, field, body);
  overlay.querySelector("#txSend").onclick = send;
  field.addEventListener("keydown", e => { if (e.key === "Enter") send(); });
}

function bubble(role, text) {
  const cls = role === "user" ? "me" : "them";
  return `<div class="msg ${cls}">${escapeHtml(text)}</div>`;
}

async function sendText(who, field, body) {
  const text = field.value.trim();
  if (!text) return;
  field.value = "";

  SC.state.threads[who].push({ role: "user", content: text });
  SC.save();
  body.insertAdjacentHTML("beforeend", bubble("user", text));
  body.scrollTop = body.scrollHeight;

  // typing indicator
  const typing = document.createElement("div");
  typing.className = "msg them typing";
  typing.innerHTML = "<span></span><span></span><span></span>";
  body.appendChild(typing);
  body.scrollTop = body.scrollHeight;

  try {
    const reply = await callChat(who);
    typing.remove();
    SC.state.threads[who].push({ role: "assistant", content: reply });
    SC.save();
    body.insertAdjacentHTML("beforeend", bubble("assistant", reply));
    body.scrollTop = body.scrollHeight;
  } catch (e) {
    typing.remove();
    body.insertAdjacentHTML("beforeend",
      `<div class="sys">[ ${CHARACTERS[who].name} didn't reply — connection issue. ${escapeHtml(e.message || "")} ]</div>`);
    body.scrollTop = body.scrollHeight;
  }
}

// Calls our serverless proxy. The proxy holds the key + builds the
// character system prompt from the live game state we send it.
async function callChat(who) {
  const payload = {
    character: who,
    state: {
      name: SC.state.name,
      age: SC.state.age,
      race: SC.state.race,
      cls: SC.state.cls,
      stats: SC.state.stats,
      bonds: SC.state.bonds,
      flags: SC.state.flags,
      history: SC.state.history.slice(-12),
    },
    messages: SC.state.threads[who].slice(-20),
  };
  const res = await fetch(API_BASE, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });
  if (!res.ok) throw new Error("HTTP " + res.status);
  const data = await res.json();
  return data.reply;
}

/* ---------- HELPERS ---------- */
function card(inner) { return `<div class="wrap"><div class="card">${inner}</div></div>`; }
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
}

/* ---------- BOOT ---------- */
if (SC.state.scene && SC.state.scene !== "title" && SC.load()) {
  // returning player lands on title with a Continue button
  renderTitle();
} else {
  renderTitle();
}

</script>
